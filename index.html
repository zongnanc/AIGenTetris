<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIGenTetris</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <h1>AIGenTetris</h1>
      <div class="layout">
        <canvas id="board" width="300" height="600"></canvas>
        <aside class="sidebar">
          <div class="panel stat">
            <h2>Score</h2>
            <p id="score">0</p>
          </div>
          <div class="row">
            <div class="panel stat">
              <h2>Level</h2>
              <p id="level">1</p>
            </div>
            <div class="panel stat">
              <h2>Lines</h2>
              <p id="lines">0</p>
            </div>
          </div>
          <div class="panel">
            <h2>Next</h2>
            <canvas id="next" width="120" height="80"></canvas>
          </div>
          <div class="panel">
            <h2>Hold</h2>
            <canvas id="hold" width="120" height="80"></canvas>
          </div>
          <p class="controls">
            ← → move · ↓ soft drop · Space hard drop<br />
            ↑ / X rotate · Z rotate ccw · C hold<br />
            P pause · R restart · M mute
          </p>
        </aside>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
